<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#brand-grad)" stroke-width="2" stroke-opacity="0.15" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#brand-grad)" stroke-width="4" stroke-opacity="0.25" stroke-dasharray="20 10 5 10" />

  <!-- Document Shape -->
  <path d="M190 140 H290 L342 192 V372 C342 388.5 328.5 402 312 402 H190 C173.5 402 160 388.5 160 372 V170 C160 153.5 173.5 140 190 140 Z" fill="#1e293b" stroke="url(#brand-grad)" stroke-width="4" filter="url(#glow)" />
  <path d="M290 140 V192 H342" fill="none" stroke="url(#brand-grad)" stroke-width="4" />

  <!-- Eye / Surveillance Symbol inside document -->
  <path d="M200 280 C220 250 282 250 302 280 C282 310 220 310 200 280 Z" fill="none" stroke="url(#brand-grad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="251" cy="280" r="18" fill="url(#accent-grad)" filter="url(#glow)" />
  <circle cx="257" cy="274" r="5" fill="#ffffff" />
  
  <!-- Text lines (representing summary) -->
  <line x1="190" y1="210" x2="260" y2="210" stroke="url(#brand-grad)" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7" />
  <line x1="190" y1="340" x2="310" y2="340" stroke="url(#brand-grad)" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7" />
  <line x1="190" y1="365" x2="270" y2="365" stroke="url(#brand-grad)" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7" />
</svg>
